# siteping example configuration

sites:
  - url: https://example.com
    interval: 60        # seconds between checks
    expected_status: 200
    timeout: 10.0
  - url: https://api.example.com/health
    interval: 30
    expected_status: 200
    timeout: 5.0

# Number of consecutive failures before an alert is sent
alert_after_failures: 2

# How long to keep history entries (0 = keep forever)
retention_days: 30

# Optional: path to persist state between restarts
state_file: .siteping_state.json

# Optional: send a periodic summary (e.g. "24h", "12h")
summary_interval: "24h"

# Optional email alerts
# email:
#   smtp_host: smtp.example.com
#   smtp_port: 587
#   username: alerts@example.com
#   password: secret
#   from: alerts@example.com
#   to: ops@example.com

# Optional webhook alerts (POST with JSON body)
# webhook:
#   url: https://hooks.example.com/siteping
#   secret: optional-hmac-secret
